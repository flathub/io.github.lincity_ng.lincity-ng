app-id: io.github.lincity_ng.lincity-ng
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk

command: lincity-ng
finish-args:
  - --share=ipc
  - --device=dri
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --filesystem=xdg-run/pipewire-0:ro

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - /share/doc

modules:
  # SDL3_mixer and a suitable SDL3 version will be in runtime 26.08
  # Build them ourselves for the time being
  # Build options sourced from https://gitlab.com/freedesktop-sdk/freedesktop-sdk

  - name: sdl3
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_SHARED_LIBS:BOOL=ON
      - -DSDL_TEST_LIBRARY:BOOL=OFF
      - -DSDL_TESTS:BOOL=OFF
      - -DSDL_EXAMPLES:BOOL=OFF
      - -DSDL_ALSA:BOOL=OFF
      - -DSDL_OSS:BOOL=OFF
      - -DSDL_SNDIO:BOOL=OFF
      - -DSDL_WAYLAND:BOOL=ON
      - -DSDL_WAYLAND_SHARED:BOOL=OFF
      - -DSDL_RPATH:BOOL=OFF
      - -DSDL_WAYLAND_LIBDECOR=ON
      - -DSDL_PIPEWIRE_SHARED:BOOL=ON
      - -DSDL_X11_XSCRNSAVER:BOOL=OFF
      - -DSDL_X11_XTEST:BOOL=OFF
    cleanup:
      - /lib/cmake
    sources:
      - type: archive
        url: https://github.com/libsdl-org/SDL/releases/download/release-3.4.10/SDL3-3.4.10.tar.gz
        sha256: 12b34280415ec8418c864408b93d008a20a6530687ee613d60bfbd20411f2785
        x-checker-data:
          type: json
          url: https://api.github.com/repos/libsdl-org/SDL/releases/latest
          version-query: .tag_name | sub("^release-"; "")
          url-query: .assets[] | select(.name=="SDL3-" + $version + ".tar.gz") | .browser_download_url

  - name: sdl3-mixer
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_SHARED_LIBS=ON
      - -DSDLMIXER_INSTALL=ON
      - -DSDLMIXER_INSTALL_MAN=ON
      - -DSDLMIXER_DEPS_SHARED=ON
      - -DSDLMIXER_VENDORED=OFF
      - -DSDLMIXER_STRICT=ON
      - -DSDLMIXER_TESTS=OFF
      - -DSDLMIXER_EXAMPLES=OFF
      - -DSDLMIXER_EXAMPLES_INSTALL=OFF
      - -DSDLMIXER_GME=OFF
      - -DSDLMIXER_MOD_XMP=OFF
      - -DSDLMIXER_MIDI_FLUIDSYNTH=OFF
    cleanup:
      - /lib/cmake
    sources:
      - type: archive
        url: https://github.com/libsdl-org/SDL_mixer/releases/download/release-3.2.4/SDL3_mixer-3.2.4.tar.gz
        sha256: 182a07c745375e113dc740d43964ff21b0be29f29f59876c4dbc4db3d32f6901
        x-checker-data:
          type: json
          url: https://api.github.com/repos/libsdl-org/SDL_mixer/releases/latest
          version-query: .tag_name | sub("^release-"; "")
          url-query: .assets[] | select(.name=="SDL3_mixer-" + $version + ".tar.gz")
            | .browser_download_url

  - name: libxmlplusplus
    buildsystem: meson
    config-opts:
      - -Dbuild-examples=false
      - -Dbuild-tests=false
    cleanup:
      - /lib/libxml++-5.0
    sources:
      - type: archive
        url: https://github.com/libxmlplusplus/libxmlplusplus/releases/download/5.6.1/libxml%2B%2B-5.6.1.tar.xz
        sha256: 4996e8a73995e8a4cd656c8591dce38181146edfc30cb47c97d1db3c56990ad7
        x-checker-data:
          type: json
          url: https://api.github.com/repos/libxmlplusplus/libxmlplusplus/releases/latest
          version-query: .tag_name
          url-query: .assets[] | select(.name=="libxml++-" + $version + ".tar.xz")
            | .browser_download_url

  - name: lincity-ng
    buildsystem: cmake-ninja
    config-opts:
      - -DLINCITYNG_VERSION_SUFFIX=flatpak
    sources:
      - type: archive
        url: https://github.com/lincity-ng/lincity-ng/releases/download/lincity-ng-2.15.0/lincity-ng-2.15.0-Source.tar.xz
        sha256: bc1eba0af24dd451ddf3e5ac8c335b48dcb29033ada424a3f5a798c3b1d91999
        x-checker-data:
          type: json
          is-main-source: true
          url: https://api.github.com/repos/lincity-ng/lincity-ng/releases/latest
          version-query: .tag_name | sub("^lincity-ng-"; "")
          url-query: .assets[] | select(.name=="lincity-ng-" + $version + "-Source.tar.xz")
            | .browser_download_url

        # Fixup for 2.15.0
      - type: patch
        path: 349.patch
